# ============================================
# Debug/Reference Configuration for VLESS-WS
# ============================================
# This is a REFERENCE file only — not mounted into containers.
#
# How nginx-proxy works:
#   1. docker-gen generates default.conf from nginx.tmpl
#   2. It auto-creates a "location /" block with proxy_pass to the
#      VIRTUAL_HOST container (v2ray:1310)
#   3. vhost/default is included at the SERVER level (no location blocks!)
#   4. vhost/default_location is included INSIDE the location block
#      (for custom directives like timeouts)
#
# WebSocket upgrade headers are already handled by the base nginx.tmpl:
#   proxy_set_header Upgrade $http_upgrade;
#   proxy_set_header Connection $proxy_connection;
#
# The only custom override needed is the long timeout for WS connections.
# Keep it in vhost/default_location so it is included inside the generated
# location / block. Do not put location blocks in vhost/default.
# ============================================
