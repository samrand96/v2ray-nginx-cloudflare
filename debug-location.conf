# ============================================
# Debug/Reference Configuration for VLESS-WS Path
# ============================================
# This file shows the nginx location block for VLESS-WS.
# The actual configuration is in vhost/default which is included by nginx-proxy.
# ============================================

# ============================================
# VLESS WebSocket (Port 1310) - Root Path /
# ============================================
location / {
    proxy_redirect off;
    proxy_pass http://v2ray:1310;
    proxy_http_version 1.1;
    
    # WebSocket upgrade headers (CRITICAL for WS to work)
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    
    # Required headers
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    
    # Long timeout for persistent connections
    proxy_read_timeout 86400s;
    proxy_send_timeout 86400s;
    
    # Disable buffering for real-time streaming
    proxy_buffering off;
}