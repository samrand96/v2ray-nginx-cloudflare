x-logging: &default-logging
  driver: ${DOCKER_LOG_DRIVER:-json-file}
  options:
    max-size: ${DOCKER_LOG_MAX_SIZE:-2m}
    max-file: "${DOCKER_LOG_MAX_FILE:-2}"

services:

  nginx:
    image: nginx:1.22
    container_name: nginx
    mem_limit: ${NGINX_MEMORY_LIMIT:-96m}
    logging: *default-logging
    ports:
      - '${HTTP_PORT:-80}:80'
      - '${HTTPS_PORT:-443}:443'
    restart: always
    volumes:
      - '/var/run/docker.sock:/tmp/docker.sock:ro'
      - './configs:/etc/nginx/conf.d'
      - './certs:/etc/nginx/certs'
      - './vhost:/etc/nginx/vhost.d'
      - './html:/usr/share/nginx/html'
      - './logs/nginx:/var/log/nginx'

  dockergen:
    image: 'jwilder/docker-gen:0.9'
    container_name: dockergen
    restart: always
    mem_limit: ${DOCKERGEN_MEMORY_LIMIT:-64m}
    logging: *default-logging
    command: >-
      -notify-sighup nginx -watch /etc/docker-gen/templates/nginx.tmpl
      /etc/nginx/conf.d/default.conf
    environment:
      - DISABLE_ACCESS_LOGS=${DISABLE_ACCESS_LOGS:-1}
      - NGINX_ERROR_LOG_LEVEL=${NGINX_ERROR_LOG_LEVEL:-error}
    volumes:
      - '/var/run/docker.sock:/tmp/docker.sock:ro'
      - './configs/nginx.tmpl:/etc/docker-gen/templates/nginx.tmpl'
      - './configs:/etc/nginx/conf.d'
      - './certs:/etc/nginx/certs'
      - './vhost:/etc/nginx/vhost.d'
      - './html:/usr/share/nginx/html'
      - './logs/docker-gen:/var/log/docker-gen'

  nginx-proxy-acme:
    restart: always
    image: nginxproxy/acme-companion:2.2
    container_name: nginx-proxy-acme
    mem_limit: ${ACME_MEMORY_LIMIT:-96m}
    logging: *default-logging
    volumes:
      - '/var/run/docker.sock:/var/run/docker.sock:ro'
      - './acme:/etc/acme.sh'
      - './configs:/etc/nginx/conf.d'
      - './certs:/etc/nginx/certs'
      - './vhost:/etc/nginx/vhost.d'
      - './html:/usr/share/nginx/html'
      - './logs/acme:/var/log/acme'
    environment:
      - DEFAULT_EMAIL=${LETSENCRYPT_EMAIL:-your-email@example.com}
      - NGINX_PROXY_CONTAINER=nginx
      - NGINX_DOCKER_GEN_CONTAINER=dockergen

  v2ray:
    image: ghcr.io/xtls/xray-core:${XRAY_VERSION:-latest}
    container_name: v2ray
    command: ["run", "-c", "/etc/xray/config.json"]
    restart: always
    mem_limit: ${XRAY_MEMORY_LIMIT:-128m}
    logging: *default-logging
    volumes:
      - './v2ray/config:/etc/xray:ro'
    # No extra ports - WS traffic is proxied through nginx
    environment:
      - VIRTUAL_HOST=${DOMAIN:-your-domain.com}
      - VIRTUAL_PORT=1310
      - LETSENCRYPT_HOST=${DOMAIN:-your-domain.com}
      - LETSENCRYPT_EMAIL=${LETSENCRYPT_EMAIL:-your-email@example.com}
    networks:
      - default
